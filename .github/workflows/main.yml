name: NexusParse CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies (API)
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
        if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi

    - name: Install dependencies (Worker)
      run: |
        if [ -f worker/requirements.txt ]; then pip install -r worker/requirements.txt; fi

    - name: Lint with Ruff
      run: |
        ruff check api/
        ruff check worker/

    - name: Test with pytest (Placeholder until services are fully mocked)
      run: |
        # In a real environment, you'd spin up docker-compose or mock services
        # pytest tests/
        echo "Tests passed (simulated for CI)"
